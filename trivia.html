<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anniversary Trivia - How Much Do I Love You?</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: "Inter", "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #ff6b9d 0%, #feca57 50%, #ff6b9d 100%);
      height: 100vh;
      display: grid;
      place-items: center;
      animation: gradientShift 8s ease infinite;
      overflow: auto;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .confetti {
      position: fixed;
      pointer-events: none;
    }

    .container {
      background: white;
      border-radius: 40px;
      padding: 48px;
      width: 90%;
      max-width: 700px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
      animation: slideIn 0.6s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      color: #ff6b9d;
      font-size: 2.5rem;
      margin: 0 0 24px;
      text-decoration: underline wavy #feca57;
    }

    .question {
      font-size: 1.5rem;
      color: #333;
      margin: 24px 0;
      font-weight: 600;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin: 32px 0;
    }

    .option-btn {
      padding: 16px;
      border: 3px solid #ff6b9d;
      background: white;
      border-radius: 16px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s ease;
      color: #333;
    }

    .option-btn:hover {
      background: #ff6b9d;
      color: white;
      transform: scale(1.05);
    }

    .response {
      margin-top: 32px;
      padding: 24px;
      border-radius: 24px;
      background: linear-gradient(135deg, #ffd89b, #feca57);
      font-size: 1.3rem;
      font-weight: 700;
      color: #333;
      min-height: 60px;
      display: grid;
      place-items: center;
      animation: popIn 0.5s ease;
    }

    @keyframes popIn {
      0% {
        opacity: 0;
        transform: scale(0.8);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .heart-emoji {
      font-size: 3rem;
      margin: 16px 0;
      animation: heartBeat 0.7s ease infinite;
    }

    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💕 Trivia Time! 💕</h1>
    <p class="question">How much do I love you?</p>
    
    <div class="options">
      <button class="option-btn" onclick="selectAnswer('A')">A. ALOT ALOT</button>
      <button class="option-btn" onclick="selectAnswer('B')">B. SO MUCH I DONT EVEN KNOW WHAT TO DO WITH MYSELF</button>
      <button class="option-btn" onclick="selectAnswer('C')">C. SO MUCH THAT I WABBA BE WITH YOU FOREVER AND EVER</button>
    </div>

    <div id="responseArea"></div>
  </div>

  <script>
    function selectAnswer(answer) {
      const responseArea = document.getElementById("responseArea");
      responseArea.innerHTML = `
        <div class="heart-emoji">💖</div>
        <div class="response">
          You're right! I love you more than words can say! 😘💕
        </div>
      `;
      createConfetti();
    }

    function createConfetti() {
      for (let i = 0; i < 50; i++) {
        const confetti = document.createElement("div");
        confetti.className = "confetti";
        confetti.textContent = Math.random() > 0.5 ? "❤️" : "💕";
        confetti.style.left = Math.random() * 100 + "%";
        confetti.style.top = "-20px";
        confetti.style.fontSize = Math.random() * 30 + 20 + "px";
        confetti.style.opacity = Math.random() * 0.7 + 0.3;
        document.body.appendChild(confetti);

        let top = 0;
        const speed = Math.random() * 3 + 2;
        const interval = setInterval(() => {
          top += speed;
          confetti.style.top = top + "px";
          if (top > window.innerHeight) {
            clearInterval(interval);
            confetti.remove();
          }
        }, 30);
      }
    }
  </script>
</body>
</html>
