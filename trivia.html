<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anniversary Trivia - How Much Do I Love You?</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: "Inter", "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #ff6b9d 0%, #feca57 50%, #ff6b9d 100%);
      height: 100vh;
      display: grid;
      place-items: center;
      animation: gradientShift 8s ease infinite;
      overflow: auto;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .confetti {
      position: fixed;
      pointer-events: none;
    }

    .container {
      background: white;
      border-radius: 40px;
      padding: 48px;
      width: 90%;
      max-width: 700px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
      animation: slideIn 0.6s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      color: #ff6b9d;
      font-size: 2.5rem;
      margin: 0 0 24px;
      text-decoration: underline wavy #feca57;
    }

    .question {
      font-size: 1.5rem;
      color: #333;
      margin: 24px 0;
      font-weight: 600;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin: 32px 0;
    }

    .option-btn {
      padding: 16px;
      border: 3px solid #ff6b9d;
      background: white;
      border-radius: 16px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s ease;
      color: #333;
    }

    .option-btn:hover {
      background: #ff6b9d;
      color: white;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💕 Trivia Time! 💕</h1>
    <p class="question">How much do I love you?</p>
    
    <div class="options">
      <button class="option-btn" onclick="selectAnswer('A')">A. ALOT ALOT</button>
      <button class="option-btn" onclick="selectAnswer('B')">B. SO MUCH I DONT EVEN KNOW WHAT TO DO WITH MYSELF</button>
      <button class="option-btn" onclick="selectAnswer('C')">C. SO MUCH THAT I WABBA BE WITH YOU FOREVER AND EVER</button>
    </div>
  </div>

  <script>
    function selectAnswer(answer) {
      window.open("result.html", "_blank");
    }
  </script>
</body>
</html>
